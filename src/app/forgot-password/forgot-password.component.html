<div class="page-wrapper">
  <div class="card">
    <h2>Reset your password</h2>
    <p class="subtitle">Enter the email associated with your admin account.</p>

    <form (submit)="onReset(emailInput.value, $event)">
      <app-field-set>
        <app-field-group>
          <app-field>
            <app-field-label htmlFor="email">Email Address</app-field-label>
            <app-input id="email" type="email" placeholder="admin@company.com" #emailInput="appInput"></app-input>
            <app-field-description>We will send a password reset link to this email.</app-field-description>
          </app-field>
        </app-field-group>
      </app-field-set>

      <button type="submit" class="primary-btn">Send Reset Link</button>
    </form>

    <div class="back-link">
      <a routerLink="/">Back to sign in</a>
    </div>
  </div>
</div>
